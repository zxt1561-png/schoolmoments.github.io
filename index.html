<style>
/* =========================================================
   CSS Variables · 主题色板（白天 / 黑夜）
   ========================================================= */
:root{
  --bg: linear-gradient(150deg,#FDFAF5 0%,#FAF7F0 50%,#F7F3EA 100%);
  --bg-solid:#FAF7F0;
  --card:rgba(255,255,255,0.72);
  --card-solid:#ffffff;
  --card-border:rgba(255,255,255,0.88);
  --card-border-2:rgba(76,175,80,0.10);
  --green:#4CAF50;
  --green-d1:#1B5E20; --green-d2:#2E7D32; --green-d3:#388E3C;
  --green-l1:#81C784; --green-l2:#A5D6A7; --green-l3:#C8E6C9;
  --text:#2E4A32;
  --text-2:#4E7A52;
  --text-mute:#90A4AE;
  --grad-btn:linear-gradient(135deg,#4CAF50 0%,#43A047 55%,#388E3C 100%);
  --grad-icon:linear-gradient(135deg,#66BB6A 0%,#43A047 100%);
  --shadow-card:0 4px 24px rgba(76,175,80,0.09), 0 1.5px 6px rgba(0,0,0,0.04);
  --shadow-hover:0 12px 40px rgba(76,175,80,0.16), 0 4px 16px rgba(0,0,0,0.08);
  --shadow-pin:0 4px 14px rgba(27,94,32,0.18), 0 1px 4px rgba(0,0,0,0.08);
  --overlay:rgba(40,55,42,0.28);
  --header-bg:rgba(253,250,245,0.72);
  --chip-bg:rgba(76,175,80,0.10);
  --field-bg:rgba(255,255,255,0.65);
  --field-border:rgba(76,175,80,0.22);
  --slogan-1:#1B5E20; --slogan-2:#2E7D32; --slogan-3:#388E3C; --slogan-en:#2E7D32;
}
html[data-theme="dark"]{
  --bg:linear-gradient(150deg,#0D1F10 0%,#1A2A1F 50%,#162318 100%);
  --bg-solid:#13231A;
  --card:rgba(26,42,31,0.82);
  --card-solid:#1E3024;
  --card-border:rgba(129,199,132,0.16);
  --card-border-2:rgba(102,187,106,0.14);
  --green:#66BB6A;
  --text:#C8E6C9;
  --text-2:#A5D6A7;
  --text-mute:#7C9A86;
  --grad-btn:linear-gradient(135deg,#66BB6A 0%,#4CAF50 55%,#43A047 100%);
  --grad-icon:linear-gradient(135deg,#81C784 0%,#4CAF50 100%);
  --shadow-card:0 6px 26px rgba(0,0,0,0.34), 0 1.5px 6px rgba(0,0,0,0.24);
  --shadow-hover:0 14px 44px rgba(0,0,0,0.46), 0 4px 16px rgba(0,0,0,0.3);
  --shadow-pin:0 4px 14px rgba(0,0,0,0.45);
  --overlay:rgba(0,0,0,0.5);
  --header-bg:rgba(13,31,16,0.66);
  --chip-bg:rgba(102,187,106,0.16);
  --field-bg:rgba(255,255,255,0.04);
  --field-border:rgba(129,199,132,0.22);
  --slogan-1:#A5D6A7; --slogan-2:#81C784; --slogan-3:#66BB6A; --slogan-en:#81C784;
}

/* =========================================================
   Base
   ========================================================= */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Quicksand','Noto Sans SC',system-ui,-apple-system,sans-serif;
  color:var(--text);
  background:var(--bg) fixed;
  min-height:100vh;
  min-height:100dvh;
  line-height:1.55;
  transition:background-color .28s ease,color .28s ease;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
}
/* 平滑主题过渡（限定属性，避免布局抖动） */
body,.card,.btn,.chip,.pin,.field,.header,.sheet,.modal-card{
  transition:background-color .28s ease,color .28s ease,border-color .28s ease,box-shadow .28s ease,transform .18s ease;
}
img{max-width:100%;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
a{color:inherit;text-decoration:none;}
:focus-visible{outline:2.5px solid var(--green);outline-offset:2px;border-radius:8px;}
.icon{width:1em;height:1em;display:inline-block;vertical-align:-0.125em;fill:none;}
.wrap{max-width:760px;margin:0 auto;padding:0 18px;}
.hidden{display:none !important;}
.sr-tap{min-width:44px;min-height:44px;}

/* Scrollbar hide */
.no-scrollbar{scrollbar-width:none;-ms-overflow-style:none;}
.no-scrollbar::-webkit-scrollbar{display:none;}

/* =========================================================
   Header
   ========================================================= */
.header{
  position:sticky;top:0;z-index:100;
  background:var(--header-bg);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--card-border-2);
}
.header-inner{
  max-width:760px;margin:0 auto;padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.brand{display:flex;align-items:center;gap:11px;min-height:44px;cursor:pointer;user-select:none;}
.brand-logo{
  width:40px;height:40px;border-radius:13px;flex:none;
  background:var(--grad-icon);
  display:grid;place-items:center;color:#fff;
  box-shadow:0 4px 14px rgba(76,175,80,0.32);
}
.brand-logo .icon{width:23px;height:23px;stroke-width:2.1;}
.brand-name{display:flex;flex-direction:column;line-height:1.1;}
.brand-name b{font-weight:800;font-size:1.06rem;letter-spacing:.2px;}
.brand-name span{font-size:.66rem;color:var(--text-mute);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.header-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{
  min-width:44px;min-height:44px;height:44px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:0 12px;border-radius:999px;
  background:var(--card);border:1px solid var(--card-border);
  color:var(--text-2);font-weight:800;font-size:.82rem;
  box-shadow:var(--shadow-card);
}
.icon-btn .icon{width:19px;height:19px;}
.icon-btn:hover{transform:translateY(-2px);color:var(--green-d2);}
html[data-theme="dark"] .icon-btn:hover{color:var(--green);}
.icon-btn:active{transform:scale(.95);}
.icon-btn.square{padding:0;width:44px;}

/* =========================================================
   Home · Slogan
   ========================================================= */
main{padding-bottom:64px;}
.hero{padding:46px 0 26px;text-align:center;}
.slogan{
  font-family:'Noto Serif SC','Songti SC','SimSun','STSong',serif;
  font-weight:900;
  font-size:clamp(2.8rem,11vw,5.2rem);
  line-height:1.05;letter-spacing:.04em;
  margin:0;white-space:nowrap;
}
.slogan .w1{color:var(--slogan-1);}
.slogan .w2{color:var(--slogan-2);margin:0 .12em;}
.slogan .w3{color:var(--slogan-3);}
.slogan.en{color:var(--slogan-en);letter-spacing:.01em;}
.hero-sub{
  margin:16px auto 0;max-width:30ch;
  color:var(--text-2);font-weight:700;font-size:1rem;opacity:.92;
}

/* Section title */
.sec{margin-top:34px;}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 14px;}
.sec-title{font-weight:900;font-size:1.18rem;letter-spacing:.2px;display:flex;align-items:center;gap:8px;}
.sec-title .icon{width:20px;height:20px;color:var(--green-d2);}
html[data-theme="dark"] .sec-title .icon{color:var(--green);}
.sec-hint{font-size:.78rem;color:var(--text-mute);font-weight:700;}

/* =========================================================
   Home · 全校最新瞬间（横向滚动）
   ========================================================= */
.rail{
  display:flex;gap:14px;overflow-x:auto;padding:4px 18px 14px;margin:0 -18px;
  scroll-snap-type:x mandatory;
}
.rail-card{
  scroll-snap-align:start;flex:0 0 78%;max-width:300px;
  background:var(--card);border:1px solid var(--card-border);
  border-radius:22px;padding:16px 17px;box-shadow:var(--shadow-card);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  display:flex;flex-direction:column;gap:10px;cursor:pointer;
}
.rail-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
.rail-card:active{transform:scale(.98);}
.chip{
  display:inline-flex;align-items:center;gap:6px;align-self:flex-start;
  background:var(--chip-bg);color:var(--green-d2);
  font-weight:800;font-size:.74rem;padding:5px 11px;border-radius:999px;
}
html[data-theme="dark"] .chip{color:var(--green-l1);}
.chip .icon{width:14px;height:14px;}
.rail-text{
  font-size:.96rem;color:var(--text);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.meta-time{display:flex;align-items:center;gap:5px;color:var(--text-mute);font-size:.76rem;font-weight:700;}
.meta-time .icon{width:13px;height:13px;}

/* =========================================================
   Home · 校园平面图 + 覆盖引脚
   ========================================================= */
.map-wrap{
  position:relative;border-radius:36px;overflow:hidden;
  box-shadow:var(--shadow-card);border:1px solid var(--card-border);
  background:var(--card);
}
.map-wrap img{width:100%;display:block;border-radius:inherit;}
.map-fallback{
  display:none;width:100%;aspect-ratio:1060/1160;
  background:
    radial-gradient(120% 90% at 30% 18%,rgba(165,214,167,.55),transparent 60%),
    repeating-linear-gradient(45deg,rgba(76,175,80,.06) 0 14px,transparent 14px 28px),
    var(--bg-solid);
  place-items:center;text-align:center;color:var(--text-2);padding:24px;
}
.map-wrap.fallback img{display:none;}
.map-wrap.fallback .map-fallback{display:grid;}
.map-fallback .icon{width:42px;height:42px;color:var(--green);opacity:.7;margin-bottom:10px;}
.map-fallback b{font-weight:800;font-size:1rem;}
.map-fallback small{display:block;margin-top:6px;font-size:.78rem;color:var(--text-mute);font-weight:700;}

/* 覆盖引脚（绝对定位，百分比） */
.pin{
  position:absolute;transform:translate(-50%,-100%);
  display:flex;flex-direction:column;align-items:center;cursor:pointer;
  z-index:5;
}
.pin-dot{
  width:38px;height:38px;border-radius:50%;
  background:var(--card-solid);
  display:grid;place-items:center;color:var(--green-d2);
  box-shadow:var(--shadow-pin);border:2px solid #fff;
}
html[data-theme="dark"] .pin-dot{border-color:rgba(255,255,255,.12);color:var(--green-l1);}
.pin-dot .icon{width:21px;height:21px;}
.pin-tip{
  width:0;height:0;margin-top:-2px;
  border-left:7px solid transparent;border-right:7px solid transparent;
  border-top:9px solid var(--card-solid);
  filter:drop-shadow(0 3px 2px rgba(27,94,32,.12));
}
.pin-label{
  position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%) translateY(4px);
  background:var(--green-d2);color:#fff;font-weight:800;font-size:.72rem;
  padding:4px 9px;border-radius:8px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .16s ease,transform .16s ease;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
html[data-theme="dark"] .pin-label{background:var(--green);color:#06140A;}
.pin:hover{z-index:9;}
.pin:hover .pin-dot{background:var(--grad-icon);color:#fff;transform:scale(1.18);}
.pin:hover .pin-tip{border-top-color:#43A047;}
.pin:hover .pin-label{opacity:1;transform:translateX(-50%) translateY(0);}
.pin:active .pin-dot{transform:scale(1.04);}

/* 坐标拾取模式 */
.map-wrap.picking{cursor:crosshair;}
.map-wrap.picking .pin{pointer-events:none;opacity:.45;}
.pick-marker{
  position:absolute;width:16px;height:16px;border-radius:50%;
  background:#E53935;border:2px solid #fff;transform:translate(-50%,-50%);
  box-shadow:0 2px 8px rgba(0,0,0,.4);z-index:20;pointer-events:none;
}

/* =========================================================
   Home · 点位卡片网格
   ========================================================= */
.area-label{
  font-size:.7rem;font-weight:800;letter-spacing:2.2px;text-transform:uppercase;
  color:var(--text-mute);margin:26px 2px 12px;
}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;}
.point-card{
  position:relative;background:var(--card);border:1px solid var(--card-border);
  border-radius:20px;padding:15px;box-shadow:var(--shadow-card);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  cursor:pointer;display:flex;flex-direction:column;gap:9px;min-height:44px;
}
.point-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
.point-card:active{transform:scale(.98);}
.point-ico{
  width:44px;height:44px;border-radius:14px;flex:none;
  background:var(--grad-icon);display:grid;place-items:center;color:#fff;
  box-shadow:0 4px 12px rgba(76,175,80,.28);
}
.point-ico .icon{width:24px;height:24px;stroke-width:2;}
.point-name{font-weight:800;font-size:1rem;line-height:1.25;}
.point-prev{
  font-size:.82rem;color:var(--text-2);line-height:1.45;min-height:1px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.point-prev.empty{color:var(--text-mute);font-style:italic;}
.count-badge{
  position:absolute;top:13px;right:13px;
  min-width:24px;height:24px;padding:0 7px;border-radius:999px;
  background:var(--chip-bg);color:var(--green-d2);
  font-weight:800;font-size:.72rem;display:grid;place-items:center;
}
html[data-theme="dark"] .count-badge{color:var(--green-l1);}

/* =========================================================
   关于本站（页脚）
   ========================================================= */
.about{
  margin-top:42px;padding:24px 20px;border-radius:24px;text-align:center;
  background:var(--card);border:1px solid var(--card-border);box-shadow:var(--shadow-card);
}
.about-title{font-weight:900;font-size:1.05rem;cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:7px;}
.about-title .icon{width:18px;height:18px;color:var(--green);}
.about-text{margin:10px auto 0;max-width:42ch;font-size:.86rem;color:var(--text-2);line-height:1.65;}
.about-foot{margin-top:14px;font-size:.72rem;color:var(--text-mute);font-weight:700;letter-spacing:.5px;}

/* =========================================================
   点位详情页
   ========================================================= */
.detail-top{display:flex;align-items:center;gap:10px;padding:18px 0 6px;}
.btn-back{
  min-width:44px;min-height:44px;width:44px;height:44px;border-radius:14px;
  background:var(--card);border:1px solid var(--card-border);
  display:grid;place-items:center;color:var(--text-2);box-shadow:var(--shadow-card);
}
.btn-back .icon{width:22px;height:22px;}
.btn-back:hover{transform:translateY(-2px);color:var(--green-d2);}
.btn-back:active{transform:scale(.94);}
.detail-top h1{font-size:1.3rem;font-weight:900;margin:0;}

.overview{
  background:var(--card);border:1px solid var(--card-border);border-radius:28px;
  padding:22px;box-shadow:var(--shadow-card);margin-top:8px;
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
}
.overview-head{display:flex;align-items:center;gap:15px;}
.overview-ico{
  width:64px;height:64px;border-radius:20px;flex:none;
  background:var(--grad-icon);display:grid;place-items:center;color:#fff;
  box-shadow:0 6px 18px rgba(76,175,80,.3);
}
.overview-ico .icon{width:34px;height:34px;}
.overview-head h2{margin:0;font-size:1.32rem;font-weight:900;}
.overview-desc{margin:3px 0 0;color:var(--text-2);font-size:.9rem;font-weight:600;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;}
.stat{
  background:var(--field-bg);border:1px solid var(--card-border-2);border-radius:16px;
  padding:13px 8px;text-align:center;
}
.stat b{display:block;font-size:1.5rem;font-weight:900;color:var(--green-d2);line-height:1;}
html[data-theme="dark"] .stat b{color:var(--green);}
.stat span{font-size:.72rem;color:var(--text-mute);font-weight:700;}

/* 主按钮（全宽 pill） */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  min-height:52px;padding:0 26px;border-radius:999px;
  font-weight:800;font-size:1.02rem;color:#fff;
  background:var(--grad-btn);box-shadow:0 8px 22px rgba(76,175,80,.34);
}
.btn .icon{width:20px;height:20px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(76,175,80,.42);}
.btn:active{transform:scale(.97);}
.btn-block{display:flex;width:100%;margin-top:18px;}
.btn-ghost{
  background:var(--card);color:var(--green-d2);border:1.5px solid var(--field-border);
  box-shadow:var(--shadow-card);
}
html[data-theme="dark"] .btn-ghost{color:var(--green);}
.btn-ghost:hover{box-shadow:var(--shadow-hover);}

/* 时间线 */
.timeline{margin-top:30px;}
.post{
  background:var(--card);border:1px solid var(--card-border);border-radius:22px;
  padding:17px;box-shadow:var(--shadow-card);margin-bottom:13px;
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
}
.post-head{display:flex;align-items:center;gap:11px;margin-bottom:10px;}
.avatar{
  width:40px;height:40px;border-radius:50%;flex:none;
  background:var(--grad-icon);color:#fff;display:grid;place-items:center;
  font-weight:900;font-size:1.04rem;box-shadow:0 3px 10px rgba(76,175,80,.28);
}
.post-name{font-weight:800;font-size:.96rem;}
.post-text{font-size:.97rem;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word;}
.post-imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.post-imgs.n1{grid-template-columns:minmax(0,62%);}
.post-imgs.n2{grid-template-columns:repeat(2,1fr);}
.post-imgs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;cursor:pointer;border:1px solid var(--card-border-2);}
.post-imgs img:active{transform:scale(.97);}
.empty-state{
  text-align:center;padding:38px 20px;color:var(--text-mute);
  background:var(--card);border:1px dashed var(--field-border);border-radius:22px;
}
.empty-state .icon{width:38px;height:38px;opacity:.6;margin-bottom:8px;color:var(--green-l1);}
.empty-state p{margin:0;font-weight:700;font-size:.9rem;}

/* 二维码 */
.qr-block{
  margin-top:34px;text-align:center;padding:26px 20px;border-radius:28px;
  background:var(--card);border:1px solid var(--card-border);box-shadow:var(--shadow-card);
}
.qr-canvas{display:inline-flex;padding:14px;border-radius:18px;background:rgba(255,255,255,0.5);}
html[data-theme="dark"] .qr-canvas{background:rgba(255,255,255,0.06);}
.qr-canvas img,.qr-canvas canvas{display:block;}
.qr-cap{margin-top:14px;font-size:.82rem;color:var(--text-2);font-weight:700;}

/* =========================================================
   Modal · 通用遮罩
   ========================================================= */
.overlay-mask{
  position:fixed;inset:0;z-index:200;background:var(--overlay);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .26s ease;
}
.overlay-mask.show{opacity:1;pointer-events:auto;}

/* 底部弹出 Sheet（发布表单） */
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:210;
  background:var(--card-solid);border-radius:28px 28px 0 0;
  max-height:92vh;display:flex;flex-direction:column;
  transform:translateY(102%);transition:transform .34s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -10px 40px rgba(0,0,0,.18);
  padding-bottom:env(safe-area-inset-bottom);
}
.sheet.show{transform:translateY(0);}
.sheet-inner{max-width:560px;margin:0 auto;width:100%;}
.handle{width:44px;height:5px;border-radius:999px;background:var(--text-mute);opacity:.4;margin:11px auto 4px;}
.sheet-scroll{overflow-y:auto;padding:8px 20px 22px;}
.sheet-title{font-size:1.18rem;font-weight:900;margin:6px 0 4px;}
.sheet-sub{font-size:.82rem;color:var(--text-mute);font-weight:700;margin-bottom:16px;}

/* 居中 Modal（管理员） */
.modal-card{
  position:fixed;left:50%;top:50%;z-index:210;transform:translate(-50%,-46%) scale(.96);
  width:min(620px,calc(100vw - 28px));max-height:88vh;
  background:var(--card-solid);border-radius:28px;display:flex;flex-direction:column;
  box-shadow:0 24px 70px rgba(0,0,0,.34);opacity:0;pointer-events:none;
  transition:opacity .26s ease,transform .26s cubic-bezier(.22,1,.36,1);
}
.modal-card.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 8px;}
.modal-head h2{margin:0;font-size:1.2rem;font-weight:900;}
.modal-close{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--field-bg);color:var(--text-2);}
.modal-close .icon{width:20px;height:20px;}
.modal-close:hover{color:var(--green-d2);}
.modal-scroll{overflow-y:auto;padding:6px 20px 22px;}

/* 表单字段 */
.field-label{font-weight:800;font-size:.86rem;margin:18px 0 8px;display:flex;align-items:center;gap:6px;}
.field-label:first-child{margin-top:4px;}
.uploader{
  border:1.8px dashed var(--field-border);border-radius:18px;
  padding:20px;text-align:center;color:var(--text-2);background:var(--field-bg);
  min-height:88px;display:grid;place-items:center;
}
.uploader .icon{width:30px;height:30px;color:var(--green);margin-bottom:6px;}
.uploader b{font-weight:800;font-size:.92rem;}
.uploader small{display:block;color:var(--text-mute);font-weight:700;font-size:.74rem;margin-top:3px;}
.uploader:hover{border-color:var(--green);background:var(--chip-bg);}
.previews{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;}
.preview{position:relative;width:84px;height:84px;border-radius:14px;overflow:hidden;border:1px solid var(--card-border-2);}
.preview img{width:100%;height:100%;object-fit:cover;}
.preview .del{
  position:absolute;top:3px;right:3px;width:24px;height:24px;border-radius:50%;
  background:rgba(0,0,0,.6);color:#fff;display:grid;place-items:center;
}
.preview .del .icon{width:14px;height:14px;stroke-width:2.6;}
.field{
  width:100%;border-radius:16px;border:1.5px solid var(--field-border);
  background:var(--field-bg);color:var(--text);font-family:inherit;font-size:1rem;
  padding:13px 15px;resize:vertical;
}
.field:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(76,175,80,.16);}
textarea.field{min-height:96px;line-height:1.55;}
.counter{text-align:right;font-size:.74rem;color:var(--text-mute);font-weight:700;margin-top:5px;}
.counter.warn{color:#E57373;}
/* 署名 Tabs */
.tabs{display:flex;gap:8px;background:var(--field-bg);padding:5px;border-radius:16px;border:1px solid var(--card-border-2);}
.tab{
  flex:1;min-height:44px;border-radius:12px;font-weight:800;font-size:.9rem;
  color:var(--text-2);display:flex;align-items:center;justify-content:center;gap:6px;
}
.tab.active{background:var(--grad-btn);color:#fff;box-shadow:0 4px 12px rgba(76,175,80,.3);}

/* 管理员统计 + tabs */
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.admin-stat{background:var(--field-bg);border:1px solid var(--card-border-2);border-radius:16px;padding:13px 6px;text-align:center;}
.admin-stat b{display:block;font-size:1.5rem;font-weight:900;color:var(--green-d2);line-height:1;}
html[data-theme="dark"] .admin-stat b{color:var(--green);}
.admin-stat span{font-size:.7rem;color:var(--text-mute);font-weight:700;}
.seg{display:flex;gap:8px;margin-bottom:16px;}
.seg button{
  flex:1;min-height:44px;border-radius:13px;font-weight:800;font-size:.9rem;
  background:var(--field-bg);color:var(--text-2);border:1px solid var(--card-border-2);
}
.seg button.active{background:var(--grad-btn);color:#fff;border-color:transparent;}
.review-card{background:var(--field-bg);border:1px solid var(--card-border-2);border-radius:18px;padding:15px;margin-bottom:12px;}
.review-meta{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:9px;}
.review-meta .when{font-size:.74rem;color:var(--text-mute);font-weight:700;}
.review-text{font-size:.92rem;line-height:1.5;white-space:pre-wrap;word-break:break-word;}
.review-imgs{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;}
.review-imgs img{width:56px;height:56px;object-fit:cover;border-radius:10px;cursor:pointer;}
.review-actions{display:flex;gap:9px;margin-top:13px;}
.mini-btn{
  min-height:44px;padding:0 16px;border-radius:999px;font-weight:800;font-size:.86rem;
  display:inline-flex;align-items:center;gap:6px;
}
.mini-btn .icon{width:16px;height:16px;}
.mini-approve{background:var(--grad-btn);color:#fff;flex:1;justify-content:center;}
.mini-del{background:rgba(229,57,53,.12);color:#E53935;}
html[data-theme="dark"] .mini-del{background:rgba(229,115,115,.18);color:#EF9A9A;}
.mini-btn:active{transform:scale(.96);}

/* admin: 大区筛选下拉 */
.admin-filter{
  display:flex;align-items:center;gap:10px;margin:0 0 14px;
  background:var(--field-bg);border:1px solid var(--card-border-2);
  border-radius:14px;padding:10px 14px;
}
.admin-filter label{font-size:.78rem;font-weight:800;color:var(--text-2);white-space:nowrap;}
.admin-filter select{
  flex:1;border:1.5px solid var(--field-border);background:var(--card-solid);color:var(--text);
  font:inherit;font-weight:700;font-size:.88rem;padding:9px 12px;border-radius:11px;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--green-d2) 50%),linear-gradient(135deg,var(--green-d2) 50%,transparent 50%);
  background-position:calc(100% - 18px) 50%,calc(100% - 13px) 50%;
  background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:34px;
}
html[data-theme="dark"] .admin-filter select{background-image:linear-gradient(45deg,transparent 50%,var(--green) 50%),linear-gradient(135deg,var(--green) 50%,transparent 50%);background-position:calc(100% - 18px) 50%,calc(100% - 13px) 50%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;}
.admin-filter select:focus{outline:2px solid var(--green);outline-offset:1px;}
.review-path{max-width:100%;}

/* =========================================================
   大区概览页：面包屑 + 楼层 Tab + 子点位列表
   ========================================================= */
.crumb{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:2px 4px 14px;font-size:.8rem;font-weight:700;color:var(--text-mute);
}
.crumb-seg{
  background:var(--chip-bg);color:var(--green-d2);
  padding:5px 11px;border-radius:999px;cursor:pointer;
  transition:background .18s ease,transform .12s ease;
  -webkit-tap-highlight-color:transparent;
  border:1px solid var(--card-border-2);
}
html[data-theme="dark"] .crumb-seg{color:var(--green-l1);}
.crumb-seg:active{transform:scale(.96);}
.crumb-seg.crumb-current{
  background:var(--grad-btn);color:#fff;border-color:transparent;cursor:default;
}
.crumb-seg.crumb-current:active{transform:none;}
.crumb-sep{color:var(--text-mute);font-weight:700;user-select:none;}

.group-overview .stats-2{grid-template-columns:repeat(2,1fr);}

.floor-tabs{
  display:flex;gap:8px;overflow-x:auto;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  padding:4px 2px 14px;margin:0 -4px 4px;
}
.floor-tab{
  flex:0 0 auto;scroll-snap-align:start;
  min-height:40px;padding:9px 18px;border-radius:999px;
  background:transparent;color:var(--text-2);font-weight:800;font-size:.92rem;
  border:1.5px solid var(--field-border);cursor:pointer;
  transition:background .18s ease,color .18s ease,border-color .18s ease,transform .12s ease;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.floor-tab:active{transform:scale(.96);}
.floor-tab.active{
  background:var(--grad-btn);color:#fff;border-color:transparent;
  box-shadow:0 4px 14px rgba(76,175,80,.22);
}
html[data-theme="dark"] .floor-tab.active{box-shadow:0 4px 14px rgba(0,0,0,.4);}

.floor-pane{display:none;}
.floor-pane.active{display:block;animation:fadeFloor .28s cubic-bezier(.22,1,.36,1) both;}
@keyframes fadeFloor{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.child-list{display:flex;flex-direction:column;gap:0;}
.child-row{
  display:flex;align-items:flex-start;gap:13px;
  background:var(--card);border:1px solid var(--card-border);
  border-radius:18px;padding:14px 14px;margin-bottom:10px;
  box-shadow:var(--shadow-card);cursor:pointer;
  transition:transform .14s ease,box-shadow .18s ease;
  -webkit-tap-highlight-color:transparent;
  text-decoration:none;color:inherit;
}
.child-row:hover{transform:translateY(-2px);box-shadow:var(--shadow-hover);}
.child-row:active{transform:scale(.99);}
.child-row-ico{
  flex:0 0 auto;width:42px;height:42px;border-radius:13px;
  background:var(--grad-icon);color:#fff;display:grid;place-items:center;
  box-shadow:0 3px 10px rgba(76,175,80,.22);
}
.child-row-ico .icon{width:21px;height:21px;}
.child-row-body{flex:1;min-width:0;}
.child-row-head{
  display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  margin-bottom:3px;
}
.child-row-name{font-weight:800;font-size:.97rem;color:var(--text);}
.child-row-count{
  flex:0 0 auto;font-size:.74rem;font-weight:800;color:var(--green-d2);
  background:var(--chip-bg);padding:3px 10px;border-radius:999px;
  border:1px solid var(--card-border-2);
}
html[data-theme="dark"] .child-row-count{color:var(--green-l1);}
.child-row-prev{
  font-size:.82rem;color:var(--text-2);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;text-overflow:ellipsis;
}
.child-row-prev.empty{color:var(--text-mute);font-style:italic;}

/* =========================================================
   内容安全：关怀弹窗 + 管理面板（拦截记录 / 词库管理）
   ========================================================= */
/* 全屏居中遮罩，层级高于发布表单 */
.care-overlay{
  position:fixed;inset:0;z-index:400;display:grid;place-items:center;padding:20px;
  background:rgba(20,40,25,.5);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  opacity:0;pointer-events:none;transition:opacity .28s ease;
}
.care-overlay.show{opacity:1;pointer-events:auto;}
.care-card{
  width:min(520px,100%);max-height:90vh;overflow-y:auto;
  background:var(--card-solid);border-radius:28px;
  padding:30px 26px 22px;text-align:center;
  border:1px solid var(--card-border-2);
  box-shadow:0 30px 80px rgba(0,0,0,.4);
  transform:translateY(14px) scale(.98);transition:transform .3s cubic-bezier(.22,1,.36,1);
  background-image:linear-gradient(180deg,var(--chip-bg),transparent 220px);
}
.care-overlay.show .care-card{transform:translateY(0) scale(1);}
.care-logo{

  display:grid;place-items:center;background:var(--grad-icon);color:#fff;
  box-shadow:0 8px 22px rgba(76,175,80,.34);
}
.care-logo .icon{width:30px;height:30px;}
.care-card.accent-civility .care-logo{background:linear-gradient(135deg,#FFB74D,#FB8C00);box-shadow:0 8px 22px rgba(251,140,0,.3);}
.care-title{font-size:1.32rem;font-weight:700;line-height:1.35;margin:0 0 16px;color:var(--text);}
.care-body{text-align:left;font-size:.95rem;line-height:1.75;color:var(--text-2);}
.care-body p{margin:0 0 12px;}
.care-body b{color:var(--text);font-weight:700;}
.care-body a{color:var(--green-d2);font-weight:700;text-decoration:none;border-bottom:1.5px solid var(--green-l2);}
html[data-theme="dark"] .care-body a{color:var(--green-l1);}
.care-steps{
  background:var(--chip-bg);border:1px solid var(--card-border-2);
  border-radius:18px;padding:16px 18px;margin:14px 0;
}
.care-steps-title{font-weight:700;color:var(--text);margin-bottom:8px;font-size:.92rem;}
.care-steps ol{margin:0;padding-left:20px;}
.care-steps li{margin-bottom:8px;}
.care-warm{text-align:center;font-size:1rem;line-height:1.9;color:var(--green-d2);margin-top:18px;}
html[data-theme="dark"] .care-warm{color:var(--green-l1);}
/* 占位二维码（请替换为实际图片） */
.care-qr{display:flex;flex-direction:column;align-items:center;gap:8px;margin:14px 0;}
.care-qr-box{
  width:128px;height:128px;border-radius:16px;display:grid;place-items:center;gap:4px;
  background:repeating-conic-gradient(var(--green-l3) 0% 25%,transparent 0% 50%) 50%/16px 16px,var(--card-solid);
  border:2px dashed var(--green-l1);color:var(--green-d2);text-align:center;
}
.care-qr-box .icon{width:26px;height:26px;}
.care-qr-box span{font-size:.7rem;font-weight:700;}
.care-qr-cap{font-size:.74rem;color:var(--text-mute);font-weight:600;text-align:center;line-height:1.5;}
.care-actions{display:flex;flex-direction:column;gap:10px;margin-top:22px;}
.care-actions .btn{min-height:52px;font-size:1rem;}
.care-primary{background:var(--grad-btn);}
.care-foot{
  font-size:.78rem;color:var(--text-mute);line-height:1.7;margin:16px 4px 2px;
  text-align:center;font-weight:600;
}

/* 管理面板：可折叠区块 */
.admin-section{
  margin-top:14px;border:1px solid var(--card-border-2);border-radius:18px;
  background:var(--field-bg);overflow:hidden;
}
.admin-section>summary{
  list-style:none;cursor:pointer;padding:15px 16px;font-weight:800;font-size:.92rem;
  display:flex;align-items:center;gap:8px;color:var(--text);-webkit-tap-highlight-color:transparent;
}
.admin-section>summary::-webkit-details-marker{display:none;}
.admin-section>summary::after{content:'▾';margin-left:auto;color:var(--text-mute);transition:transform .2s ease;}
.admin-section[open]>summary::after{transform:rotate(180deg);}
.sec-count{
  background:var(--chip-bg);color:var(--green-d2);font-size:.72rem;font-weight:800;
  padding:2px 9px;border-radius:999px;border:1px solid var(--card-border-2);
}
html[data-theme="dark"] .sec-count{color:var(--green-l1);}
.filter-tip{font-size:.76rem;color:var(--text-mute);line-height:1.6;padding:0 16px 12px;font-weight:600;}

/* 拦截记录列表 */
.flag-list{padding:0 12px;display:flex;flex-direction:column;gap:9px;max-height:300px;overflow-y:auto;}
.flag-empty{padding:8px 16px 16px;color:var(--text-mute);font-size:.85rem;font-weight:600;}
.flag-card{background:var(--card-solid);border:1px solid var(--card-border-2);border-radius:14px;padding:11px 13px;}
.flag-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.flag-tag{font-size:.7rem;font-weight:800;padding:2px 9px;border-radius:999px;color:#fff;background:var(--green);}
.flag-tag.fl-crisis{background:#E53935;}
.flag-tag.fl-distress{background:#FB8C00;}
.flag-tag.fl-abuse{background:#8E24AA;}
.flag-tag.fl-violence{background:#6D4C41;}
.flag-tag.fl-inapp{background:#3949AB;}
.flag-card .when{font-size:.72rem;color:var(--text-mute);font-weight:600;}
.flag-text{font-size:.88rem;line-height:1.5;color:var(--text-2);word-break:break-word;}

/* 敏感词 / 白名单管理 */
#filterMgr{padding:0 12px;}
.word-group{margin-bottom:16px;}
.word-group-head{font-weight:800;font-size:.84rem;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.word-count{background:var(--chip-bg);color:var(--green-d2);font-size:.68rem;font-weight:800;padding:1px 8px;border-radius:999px;}
html[data-theme="dark"] .word-count{color:var(--green-l1);}
.word-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px;}
.word-empty{color:var(--text-mute);font-size:.8rem;font-style:italic;}
.word-chip{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--card-solid);border:1px solid var(--card-border-2);
  border-radius:999px;padding:5px 6px 5px 12px;font-size:.82rem;font-weight:700;color:var(--text);
}
.word-chip.wl{background:var(--chip-bg);border-color:var(--green-l2);color:var(--green-d2);}
html[data-theme="dark"] .word-chip.wl{color:var(--green-l1);}
.word-chip button{
  width:20px;height:20px;border-radius:50%;display:grid;place-items:center;
  background:var(--field-bg);color:var(--text-mute);font-size:15px;line-height:1;font-weight:700;
}
.word-chip button:hover{background:#E57373;color:#fff;}
.word-input{padding:10px 13px;font-size:.9rem;}

/* =========================================================
   Lightbox / Toast / 拾取按钮
   ========================================================= */
.lightbox{
  position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.93);
  display:grid;place-items:center;padding:24px;
  opacity:0;pointer-events:none;transition:opacity .24s ease;
}
.lightbox.show{opacity:1;pointer-events:auto;}
.lightbox img{max-width:100%;max-height:88vh;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.lightbox .lb-close{
  position:absolute;top:max(18px,env(safe-area-inset-top));right:18px;
  width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;
  display:grid;place-items:center;backdrop-filter:blur(6px);
}
.lightbox .lb-close .icon{width:24px;height:24px;}

.toast-wrap{position:fixed;left:0;right:0;bottom:30px;z-index:400;display:flex;justify-content:center;pointer-events:none;padding:0 20px;}
.toast{
  background:var(--green-d2);color:#fff;font-weight:800;font-size:.92rem;
  padding:14px 22px;border-radius:999px;box-shadow:0 12px 34px rgba(27,94,32,.4);
  transform:translateY(24px);opacity:0;transition:opacity .3s ease,transform .3s ease;
  max-width:90vw;text-align:center;
}
html[data-theme="dark"] .toast{background:rgba(102,187,106,.92);color:#06140A;}
.toast.show{transform:translateY(0);opacity:1;}

.fab{
  position:fixed;right:18px;bottom:max(22px,env(safe-area-inset-bottom));z-index:150;
  width:52px;height:52px;border-radius:50%;background:var(--card-solid);
  border:1px solid var(--card-border);box-shadow:var(--shadow-hover);
  display:grid;place-items:center;color:var(--green-d2);
}
.fab .icon{width:24px;height:24px;}
.fab.active{background:var(--grad-btn);color:#fff;}
.fab:active{transform:scale(.92);}
html[data-theme="dark"] .fab{color:var(--green);}

.pick-info{
  position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:151;
  background:var(--card-solid);border:1px solid var(--card-border);border-radius:16px;
  padding:13px 16px;box-shadow:var(--shadow-hover);max-width:92vw;
  font-size:.82rem;font-weight:700;color:var(--text);
  opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;text-align:center;
}
.pick-info.show{opacity:1;transform:translateX(-50%) translateY(0);}
.pick-info code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--green-d2);font-weight:800;}
html[data-theme="dark"] .pick-info code{color:var(--green-l1);}
.pick-info small{display:block;color:var(--text-mute);font-size:.72rem;margin-top:4px;}

/* fade-in 列表动画 */
@keyframes rise{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.rise{animation:rise .4s cubic-bezier(.22,1,.36,1) both;}

/* =========================================================
   Responsive
   ========================================================= */
@media(min-width:500px){
  .grid{grid-template-columns:repeat(3,1fr);}
  .rail-card{flex-basis:46%;}
}
@media(max-width:360px){
  .slogan{letter-spacing:.01em;}
  .header-actions .label-txt{display:none;}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important;}
}

<!-- ===================== Header ===================== -->
<header class="header">
  <div class="header-inner">
    <div class="brand" id="brand" title="">
      <div class="brand-logo"><svg class="icon"><use href="#icon-logo"/></svg></div>
      <div class="brand-name">
        <b id="siteName">校园瞬间</b>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="langBtn" aria-label="language">
        <svg class="icon"><use href="#icon-lang"/></svg><span class="label-txt" id="langTxt">EN</span>
      </button>
      <button class="icon-btn square" id="themeBtn" aria-label="theme">
        <svg class="icon"><use href="#icon-moon"/></svg>
      </button>
    </div>
  </div>
</header>

<!-- ===================== App（首页 / 详情页 渲染容器） ===================== -->
<main id="app" class="wrap"></main>

<!-- ===================== 通用遮罩 ===================== -->
<div class="overlay-mask" id="mask"></div>

<!-- ===================== 发布表单（底部 Sheet） ===================== -->
<section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
  <div class="handle"></div>
  <div class="sheet-inner">
    <div class="sheet-scroll">
      <div class="sheet-title" id="sheetTitle">发布我的瞬间</div>
      <div class="sheet-sub" id="sheetSub"></div>

      <div class="field-label" id="lblPhoto"><svg class="icon"><use href="#icon-image"/></svg>添加照片</div>
      <div class="uploader" id="uploader">
        <input type="file" accept="image/*" multiple id="fileInput" hidden>
        <div>
          <svg class="icon"><use href="#icon-image"/></svg>
          <b id="upMain">点击添加照片</b>
          <small id="upSub">最多 3 张 · 自动压缩</small>
        </div>
      </div>
      <div class="previews" id="previews"></div>

      <div class="field-label" id="lblText"><svg class="icon"><use href="#icon-edit"/></svg>此刻的心情</div>

      <div class="field-label" id="lblName">署名方式</div>
      <div class="tabs">
        <button class="tab active" id="tabAnon" data-mode="anon">🙈 <span id="anonTxt">完全匿名</span></button>
        <button class="tab" id="tabNick" data-mode="nick">✏️ <span id="nickTxt">自定义昵称</span></button>
      </div>
      <input type="text" class="field" id="nickInput" maxlength="20" placeholder="" style="margin-top:10px;display:none;">

      <button class="btn btn-block" id="submitPost"><svg class="icon"><use href="#icon-spark"/></svg><span id="submitTxt">提交瞬间</span></button>
    </div>
  </div>
</section>

    </div>

      <select id="adminAreaSel"></select>
    </div>
    <div id="reviewList"></div>
    <button class="btn btn-ghost btn-block" id="exportBtn"><svg class="icon"><use href="#icon-download"/></svg><span id="exportTxt">导出已审核投稿 (JSON)</span></button>

    </details>

/* 顶级 id → 顶级点位（group 或 single） */
const POINT_MAP = Object.fromEntries(POINTS.map(p=>[p.id,p]));

/* 构建子点位索引：childId → {group, floor, child} */
const CHILD_MAP = (()=>{
  const m={};
  for(const p of POINTS){
    if(p.type!=='group') continue;
    for(const fl of p.floors){
      for(const ch of fl.children){
        m[ch.id] = { group:p, floor:fl, child:ch };
      }
    }
  }
  return m;
})();

/* 解析任意 id，返回 {kind, point, parent?, floor?}，未知返回 null */
function resolvePoint(id){
  const top = POINT_MAP[id];
  if(top) return { kind: top.type, point: top };
  const c = CHILD_MAP[id];
  if(c) return { kind:'child', point:c.child, parent:c.group, floor:c.floor };
  return null;
}

/* 收集大区所有子点位 id */
function groupChildIds(groupId){
  const g = POINT_MAP[groupId];
  if(!g || g.type!=='group') return [];
  const out=[];
  g.floors.forEach(f=>f.children.forEach(c=>out.push(c.id)));
  return out;
}

/* 当前语言下的完整路径文本（用于审核列表 / 导出 JSON） */
function fullPathText(id, lang){
  const c = CHILD_MAP[id];
  if(c){
    const ln = (o)=> (o && (o[lang]||o.zh)) || '';
    const parts = [ ln(c.group.name) ];
    if(c.group.hasFloors) parts.push(ln(c.floor.floorName));
    parts.push(ln(c.child.name));
    return parts.join(' › ');
  }
  const g = POINT_MAP[id];
  if(g) return (g.name[lang]||g.name.zh);
  return id;
}

function relTime(iso){
  const now=Date.now(), then=new Date(iso).getTime();
  const d=Math.max(0,now-then), m=60000,h=3600000,day=86400000;
  const zh=state.lang==='zh';
  if(d<m) return zh?'刚刚':'just now';
  if(d<h){const n=Math.floor(d/m);return zh?`${n}分钟前`:`${n} min ago`;}
  if(d<day){const n=Math.floor(d/h);return zh?`${n}小时前`:`${n} h ago`;}
  if(d<7*day){const n=Math.floor(d/day);return zh?`${n}天前`:`${n} d ago`;}
  const dt=new Date(iso);
  const mm=String(dt.getMonth()+1).padStart(2,'0'),dd=String(dt.getDate()).padStart(2,'0');
  return zh?`${mm}月${dd}日`:`${mm}/${dd}`;
}

  const hit=(list)=>{ for(const w of (list||[])){ const k=(w||'').trim().toLowerCase(); if(k&&text.includes(k)) return w; } return null; };
  const c=hit(FILTER.crisis);        if(c) return {action:'block',category:'crisis',word:c};
  if(hit(FILTER.whitelist))           return {action:'pass'};   // 白名单放行（危机词除外）
  const d=hit(FILTER.distress);      if(d) return {action:'block',category:'distress',word:d};
  const a=hit(FILTER.abuse);         if(a) return {action:'block',category:'abuse',word:a};
  const v=hit(FILTER.violence);      if(v) return {action:'block',category:'violence',word:v};
  const i=hit(FILTER.inappropriate); if(i) return {action:'block',category:'inappropriate',word:i};
  return {action:'pass'};
}

  saveFlags();
}

  let crumbHTML='';

    const parts=[
      `<a class="crumb-seg" data-point="${esc(r.parent.id)}">${esc(r.parent.name[state.lang]||r.parent.name.zh)}</a>`
    ];
    if(r.parent.hasFloors){
      // 楼层段：可点击但返回到 group（楼层会自动定位到这一层）
      parts.push(`<a class="crumb-seg" data-point="${esc(r.parent.id)}" data-floor="${esc(r.floor.floorId)}">${esc(r.floor.floorName[state.lang]||r.floor.floorName.zh)}</a>`);
    }
    parts.push(`<span class="crumb-seg crumb-current">${esc(p.name[state.lang]||p.name.zh)}</span>`);
    crumbHTML = `<nav class="crumb">${parts.join('<span class="crumb-sep">›</span>')}</nav>`;

/* QR 生成 */
function buildQR(id){
  const box=$('#qrBox'); if(!box||typeof QRCode==='undefined') return;
  box.innerHTML='';
  const url=location.origin+location.pathname+'#point='+id;
  try{
    new QRCode(box,{text:url,width:168,height:168,colorDark:'#2E7D32',colorLight:'rgba(0,0,0,0)',correctLevel:QRCode.CorrectLevel.M});
  }catch(e){ box.innerHTML='<span style="color:var(--text-mute);font-size:.8rem">QR unavailable</span>'; }
}

function currentRoute(){
  const m=location.hash.match(/point=([\w-]+)/);
  if(!m) return {view:'home'};
  const id=m[1];
  const r=resolvePoint(id);
  if(!r) return {view:'home'};                       // 未知 id → 回首页
  if(r.kind==='group') return {view:'group', id};    // 大区概览页
  return {view:'detail', id, kind:r.kind};           // single 或 child → 详情页
}
function render(){
  const r=currentRoute();
  if(r.view==='group') renderGroup(r.id);
  else if(r.view==='detail') renderPoint(r.id);
  else renderHome();
}
window.addEventListener('hashchange',render);

const MAX_IMG=3, MAX_SRC_BYTES=25*1024*1024; // 压缩前的安全上限（单张原图 ≤ 25MB）

function openSheet(pointId){
  sheetState={ pointId, images:[], mode:'anon' };
  $('#textInput').value=''; $('#nickInput').value=''; $('#nickInput').style.display='none';
  $('#previews').innerHTML=''; updateCounter();
  $('#tabAnon').classList.add('active'); $('#tabNick').classList.remove('active');
  $('#sheet').classList.add('show'); syncMask();
}
function closeSheet(){ $('#sheet').classList.remove('show'); syncMask(); }

function updateCounter(){
  const n=$('#textInput').value.length;
  const c=$('#counter'); c.textContent=n+' / 300'; c.classList.toggle('warn',n>=300);
}
function renderPreviews(){
  $('#previews').innerHTML=sheetState.images.map((src,i)=>
    `<div class="preview"><img src="${esc(src)}" alt=""><button class="del" data-del="${i}" aria-label="remove"><svg class="icon"><use href="#icon-close"/></svg></button></div>`
  ).join('');
}
/* 浏览器端压缩：等比缩放到最长边 ≤ 1280px，导出 JPEG(0.72)
   这样手机拍的 3~12MB 大图会被压到 ~100~300KB，
   既能正常上传，也不会撑爆 localStorage（约 5MB 上限）。 */
function compressImage(file, maxDim=1280, quality=0.72){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.naturalWidth, h=img.naturalHeight;
      if(!w||!h){ reject(new Error('bad image')); return; }
      if(w>maxDim||h>maxDim){ const s=Math.min(maxDim/w, maxDim/h); w=Math.round(w*s); h=Math.round(h*s); }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      const ctx=cv.getContext('2d');
      ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); // 透明 PNG 转白底，避免变黑
      ctx.drawImage(img,0,0,w,h);
      try{ resolve(cv.toDataURL('image/jpeg', quality)); }
      catch(e){ reject(e); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('decode failed')); };
    img.src=url;
  });
}
async function handleFiles(files){
  const arr=Array.from(files||[]);
  for(const f of arr){
    if(sheetState.images.length>=MAX_IMG){ toast(t('toastMax')); break; }
    if(!f.type.startsWith('image/')) continue;
    if(f.size>MAX_SRC_BYTES){ toast(t('toastTooBig')); continue; }
    try{
      const dataUrl=await compressImage(f);
      if(sheetState.images.length<MAX_IMG){ sheetState.images.push(dataUrl); renderPreviews(); }
    }catch(e){ toast(t('toastSaveFail')); }
  }
}
async function submitPost(){
  const text=$('#textInput').value.trim();
  if(!text && sheetState.images.length===0){ toast(t('toastEmpty')); return; }

  // —— 内容安全检测（命中则阻止发布，弹出引导）——
  if(text){
    const verdict=moderateText(text);
    if(verdict.action==='block'){
      logFlag(text, verdict.category, sheetState.pointId);
      if($('#adminModal').classList.contains('show')) renderFlagList();
      openCare(verdict.category);
      return;   // 阻止：不写入数据库，不进入审核队列
    }
  }

  let nickname='';
  if(sheetState.mode==='nick'){ nickname=$('#nickInput').value.trim(); }

  const btn=$('#submitPost'); if(btn) btn.disabled=true;
  try{
    if(USE_BACKEND){
      // 1) 图片：压缩后的 dataURL → 上传云存储 → 收集公开 URL
      const urls=[];
      for(const dataUrl of sheetState.images){ const u=await uploadImage(dataUrl); if(u) urls.push(u); }
      // 2) 写入一条 pending 投稿（RLS 强制 status=pending）
      const { error } = await SUPA.from('posts').insert({ point_id:sheetState.pointId, text, nickname, images:urls, status:'pending' });
      if(error){ throw error; }
    } else {
      const post={ id:uid(), pointId:sheetState.pointId, text, images:sheetState.images.slice(),
                   nickname, time:new Date().toISOString(), status:'pending' };
      const local=loadLocalPosts(); local.push(post);
      if(!saveLocalPosts(local)){ toast(t('toastSaveFail')); return; }
    }
    closeSheet();
    toast(t('toastSubmit'));
    await refreshPosts(); render();
    if($('#adminModal').classList.contains('show')) renderAdmin();
  }catch(e){
    console.warn('发布失败:', e.message||e.hint||JSON.stringify(e)); toast(t('toastSaveFail'));
  }finally{ if(btn) btn.disabled=false; }
}

/* =========================================================
   12. 管理员审核面板
   ========================================================= */
let adminTab='pending';
let adminAreaFilter='all';      // 'all' | 'o' | 'i'

// 根据登录状态切换：登录表单 ↔ 审核面板
function applyAdminUI(){
  const loginBox=$('#adminLogin'), body=$('#adminBody'), logout=$('#admLogoutBtn');
  const needLogin = USE_BACKEND && !isAdmin;
  if(loginBox) loginBox.hidden = !needLogin;
  if(body) body.hidden = needLogin;
  if(logout) logout.hidden = !USE_BACKEND;   // 仅后端模式显示「退出登录」
}
async function checkAdminSession(){
  if(!USE_BACKEND){ isAdmin=true; return; }
  try{ const { data }=await SUPA.auth.getSession(); isAdmin=!!(data&&data.session); }
  catch(e){ isAdmin=false; }
}
async function adminLogin(){
  const email=$('#admEmail').value.trim(), password=$('#admPass').value;
  if(!email||!password){ toast(state.lang==='zh'?'请输入邮箱和密码':'Enter email and password'); return; }
  const btn=$('#admLoginBtn'); if(btn) btn.disabled=true;
  try{
    const { error }=await SUPA.auth.signInWithPassword({ email, password });
    if(error){ toast(state.lang==='zh'?'登录失败，请检查账号密码':'Login failed'); return; }
    isAdmin=true; $('#admPass').value='';
    await refreshPosts(); applyAdminUI(); renderAdmin(); renderFlagList(); renderFilterAdmin(); render();
    toast(state.lang==='zh'?'已登录':'Signed in');
  }finally{ if(btn) btn.disabled=false; }
}
async function adminLogout(){
  if(USE_BACKEND){ try{ await SUPA.auth.signOut(); }catch(e){} }
  isAdmin=!USE_BACKEND;
  await refreshPosts(); applyAdminUI(); render();
  toast(state.lang==='zh'?'已退出':'Signed out');
}

async function openAdmin(){
  adminTab='pending'; adminAreaFilter='all';
  await checkAdminSession();
  applyAdminUI();
  if(isAdmin){ await refreshPosts(); renderAdmin(); renderFlagList(); renderFilterAdmin(); }
  $('#adminModal').classList.add('show'); syncMask();
}
function closeAdmin(){ $('#adminModal').classList.remove('show'); syncMask(); }

/* 拦截记录列表 */
const FLAG_LABEL={
  crisis:{zh:'危机',en:'Crisis',cls:'fl-crisis'},
  distress:{zh:'情绪',en:'Distress',cls:'fl-distress'},
  abuse:{zh:'脏话',en:'Abuse',cls:'fl-abuse'},
  violence:{zh:'暴力',en:'Violence',cls:'fl-violence'},
  inappropriate:{zh:'不良',en:'Bad',cls:'fl-inapp'}
};
function renderFlagList(){
  const box=$('#flagList'); if(!box) return;
  const flags=DB.flags||[];
  const cEl=$('#flagCount'); if(cEl) cEl.textContent=flags.length;
  if(!flags.length){ box.innerHTML=`<div class="flag-empty">${esc(state.lang==='zh'?'暂无拦截记录':'No records')}</div>`; return; }
  box.innerHTML=flags.map(f=>{
    const lb=FLAG_LABEL[f.category]||{zh:f.category,en:f.category,cls:''};
    const path=fullPathText(f.pointId, state.lang);
    return `<div class="flag-card">
      <div class="flag-top"><span class="flag-tag ${lb.cls}">${esc(lb[state.lang]||lb.zh)}</span><span class="when">${esc(path)} · ${relTime(f.time)}</span></div>
      <div class="flag-text">${esc(f.text)}</div>
    </div>`;
  }).join('');
}

/* 敏感词 & 白名单管理 */
function renderFilterAdmin(){
  const box=$('#filterMgr'); if(!box) return;
  box.innerHTML=FILTER_CATS.map(c=>{
    const words=FILTER[c.key]||[];
    const chips=words.map((w,i)=>
      `<span class="word-chip ${c.key==='whitelist'?'wl':''}">${esc(w)}<button data-del-word="${c.key}:${i}" aria-label="删除">×</button></span>`
    ).join('');
    const label = state.lang==='zh' ? c.zh : c.en;
    return `<div class="word-group">
      <div class="word-group-head">${esc(label)}<span class="word-count">${words.length}</span></div>
      <div class="word-chips">${chips||`<span class="word-empty">${esc(state.lang==='zh'?'（空）':'(empty)')}</span>`}</div>
      <input type="text" class="field word-input" data-add-cat="${c.key}" maxlength="20" placeholder="${esc(state.lang==='zh'?'输入词条后按回车添加':'Type word, press Enter')}">
    </div>`;
  }).join('');
}

// 解析投稿的 area（child → 父大区 area；single → 自身 area；未知 → null）
function postArea(pointId){
  const r=resolvePoint(pointId);
  if(!r) return null;
  return r.kind==='child' ? r.parent.area : r.point.area;
}

function renderAdmin(){
  const all=DB.posts;
  $('#stTotal').textContent=all.length;
  $('#stPend').textContent=all.filter(p=>p.status==='pending').length;
  $('#stAppr').textContent=all.filter(p=>p.status==='approved').length;
  $('#segPend').classList.toggle('active',adminTab==='pending');
  $('#segAppr').classList.toggle('active',adminTab==='approved');

  // 同步筛选下拉的 label/options（语言切换或刚打开时）
  const sel=$('#adminAreaSel');
  if(sel){
    const cur = sel.value || adminAreaFilter;
    sel.innerHTML =
      `<option value="all">${esc(t('filterAll'))}</option>` +
      AREA_ORDER.map(ak=>`<option value="${ak}">${esc(AREAS[ak][state.lang])}</option>`).join('');
    sel.value = adminAreaFilter;
    const lbl=$('#adminAreaLbl'); if(lbl) lbl.textContent=t('filterArea');
  }

  let list=all.filter(p=>p.status===adminTab);
  if(adminAreaFilter!=='all') list = list.filter(p=>postArea(p.pointId)===adminAreaFilter);
  list.sort((a,b)=>new Date(b.time)-new Date(a.time));

  const box=$('#reviewList');
  if(!list.length){
    box.innerHTML=`<div class="empty-state"><svg class="icon"><use href="#icon-spark"/></svg><p>${esc(adminTab==='pending'?t('noPend'):t('noAppr'))}</p></div>`;
    return;
  }
  box.innerHTML=list.map(p=>{
    const r=resolvePoint(p.pointId);
    const icon = r ? (r.kind==='child' ? r.parent.icon : r.point.icon) : 'icon-pin';
    const path = fullPathText(p.pointId, state.lang);
    const imgs=(p.images&&p.images.length)
      ? `<div class="review-imgs">`+p.images.map(s=>`<img src="${esc(s)}" data-full="${esc(s)}" alt="">`).join('')+`</div>` : '';
    const actions = p.status==='pending'
      ? `<div class="review-actions">
           <button class="mini-btn mini-approve" data-approve="${esc(p.id)}"><svg class="icon"><use href="#icon-check"/></svg>${esc(t('approve'))}</button>
           <button class="mini-btn mini-del" data-del-post="${esc(p.id)}"><svg class="icon"><use href="#icon-close"/></svg>${esc(t('del'))}</button>
         </div>`
      : `<div class="review-actions"><button class="mini-btn mini-del" data-del-post="${esc(p.id)}"><svg class="icon"><use href="#icon-close"/></svg>${esc(t('del'))}</button></div>`;
    return `<div class="review-card">
      <div class="review-meta">
        <span class="chip review-path"><svg class="icon"><use href="#${icon}"/></svg>${esc(path)}</span>
        <span class="when">${esc(p.nickname||t('anonName'))} · ${relTime(p.time)}</span>
      </div>
      <div class="review-text">${esc(p.text)}</div>
      ${imgs}${actions}
    </div>`;
  }).join('');
}
async function approvePost(id){
  if(USE_BACKEND){
    const { error }=await SUPA.from('posts').update({status:'approved'}).eq('id',id);
    if(error){ console.warn(error); toast(t('toastSaveFail')); return; }
  } else {
    const local=loadLocalPosts(); const p=local.find(x=>x.id===id); if(!p) return;
    p.status='approved'; if(!saveLocalPosts(local)){ toast(t('toastSaveFail')); return; }
  }
  await refreshPosts(); renderAdmin(); render(); toast(t('toastApproved'));
}
async function deletePost(id){
  if(USE_BACKEND){
    const { error }=await SUPA.from('posts').delete().eq('id',id);
    if(error){ console.warn(error); toast(t('toastSaveFail')); return; }
  } else {
    let local=loadLocalPosts(); const before=local.length; local=local.filter(x=>x.id!==id);
    if(local.length===before) return; if(!saveLocalPosts(local)){ toast(t('toastSaveFail')); return; }
  }
  await refreshPosts(); renderAdmin(); render(); toast(t('toastDeleted'));
}
function refreshIfViewing(pid){
  const r=currentRoute();
  if(r.view==='detail' && r.id===pid){ renderPoint(pid); return; }
  if(r.view==='group'){
    // 大区视图：若变动的投稿属于本大区的某个子点位，重渲染
    const ids = new Set(groupChildIds(r.id));
    if(ids.has(pid)) renderGroup(r.id);
    return;
  }
  if(r.view==='home') renderHome();
}

function exportJSON(){
  const approved=DB.posts.filter(p=>p.status==='approved');
  if(!approved.length){ toast(t('toastNoExport')); return; }
  const data=approved.map(p=>{
    const r=resolvePoint(p.pointId);
    const parentZh = r && r.kind==='child' ? r.parent.name.zh : null;
    const parentEn = r && r.kind==='child' ? r.parent.name.en : null;
    return {
      pointId: p.pointId,
      path: fullPathText(p.pointId,'zh'),
      pathEn: fullPathText(p.pointId,'en'),
      area: postArea(p.pointId),
      parent: parentZh,
      parentEn: parentEn,
      content: p.text,
      nickname: p.nickname || I18N.zh.anonName,
      time: p.time,
      imageCount: (p.images||[]).length
    };
  });
  try{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='campus_moments_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast(t('toastExported'));
  }catch(e){ toast(t('toastSaveFail')); }
}

/* =========================================================
   14. 隐藏管理员入口（关于本站 5 连击 / 长按标题）
   ========================================================= */
let aboutClicks=0, aboutTimer;
function bindAboutEntry(){
  const el=$('#aboutTitle'); if(!el) return;
  el.addEventListener('click',()=>{
    aboutClicks++;
    clearTimeout(aboutTimer);
    aboutTimer=setTimeout(()=>aboutClicks=0,2000);
    if(aboutClicks>=5){ aboutClicks=0; clearTimeout(aboutTimer); openAdmin(); }
  });
}
let lpTimer, lpFired=false;
function bindLongPress(){
  const el=$('#brand');
  const start=()=>{ lpFired=false; lpTimer=setTimeout(()=>{lpFired=true; openAdmin();},2000); };
  const cancel=()=>clearTimeout(lpTimer);
  el.addEventListener('pointerdown',start);
  el.addEventListener('pointerup',cancel);
  el.addEventListener('pointerleave',cancel);
  el.addEventListener('pointercancel',cancel);
}

/* =========================================================
   15. 事件绑定 & 初始化
   ========================================================= */
function init(){
  applyTheme();
  applyLang();        // 内部会调用 render()

  // Header
  $('#brand').addEventListener('click',()=>{ if(lpFired){lpFired=false;return;} location.hash=''; });
  $('#langBtn').addEventListener('click',toggleLang);
  $('#themeBtn').addEventListener('click',toggleTheme);
  bindLongPress();

  // App 内委托：导航 / 返回 / 发布 / 看图 / 楼层切换
  $('#app').addEventListener('click',e=>{
    const full=e.target.closest('[data-full]'); if(full){ openLightbox(full.getAttribute('data-full')); return; }
    // 楼层 Tab 切换：不导航，仅切换可见 pane
    const tab=e.target.closest('[data-floor-switch]');
    if(tab){
      const gid=tab.getAttribute('data-group'), fid=tab.getAttribute('data-floor-switch');
      groupFloorState[gid]=fid;
      $$('.floor-tab').forEach(t=>t.classList.toggle('active', t===tab));
      $$('.floor-pane').forEach(pane=>pane.classList.toggle('active', pane.getAttribute('data-floor-pane')===fid));
      return;
    }
    // 面包屑里带 data-floor 的段：先记住目标楼层，再让 data-point 走默认导航
    const crumbFloor=e.target.closest('.crumb-seg[data-floor]');
    if(crumbFloor){
      const pid=crumbFloor.getAttribute('data-point'), fid=crumbFloor.getAttribute('data-floor');
      if(pid&&fid) groupFloorState[pid]=fid;
    }
    const nav=e.target.closest('[data-point]'); if(nav){ location.hash='point='+nav.getAttribute('data-point'); return; }
    const act=e.target.closest('[data-act]');
    if(act){ const a=act.getAttribute('data-act');
      if(a==='back') location.hash='';
      if(a==='share'){ const r=currentRoute(); if(r.view==='detail') openSheet(r.id); }
    }
  });

  // 发布表单
  $('#uploader').addEventListener('click',e=>{ if(e.target.closest('input')) return; $('#fileInput').click(); });
  $('#fileInput').addEventListener('change',e=>{ handleFiles(e.target.files); e.target.value=''; });
  $('#previews').addEventListener('click',e=>{ const d=e.target.closest('[data-del]'); if(d){ sheetState.images.splice(+d.getAttribute('data-del'),1); renderPreviews(); } });
  $('#textInput').addEventListener('input',updateCounter);
  $('#tabAnon').addEventListener('click',()=>{ sheetState.mode='anon'; $('#tabAnon').classList.add('active'); $('#tabNick').classList.remove('active'); $('#nickInput').style.display='none'; });
  $('#tabNick').addEventListener('click',()=>{ sheetState.mode='nick'; $('#tabNick').classList.add('active'); $('#tabAnon').classList.remove('active'); $('#nickInput').style.display='block'; $('#nickInput').focus(); });
  $('#submitPost').addEventListener('click',submitPost);

  // 防键盘遮挡：聚焦输入框时滚动到可见
  ['#textInput','#nickInput'].forEach(sel=>$(sel).addEventListener('focus',()=>{
    setTimeout(()=>{ try{$(sel).scrollIntoView({block:'center',behavior:'smooth'});}catch(e){} },300);
  }));
  if(window.visualViewport){
    visualViewport.addEventListener('resize',()=>{
      if($('#sheet').classList.contains('show')){
        $('#sheet').style.maxHeight=Math.max(300,visualViewport.height*0.94)+'px';
      }
    });
  }

  // 管理面板
  $('#adminClose').addEventListener('click',closeAdmin);
  $('#admLoginBtn').addEventListener('click',adminLogin);
  $('#admPass').addEventListener('keydown',e=>{ if(e.key==='Enter') adminLogin(); });
  $('#admLogoutBtn').addEventListener('click',adminLogout);
  $('#segPend').addEventListener('click',()=>{adminTab='pending';renderAdmin();});
  $('#segAppr').addEventListener('click',()=>{adminTab='approved';renderAdmin();});
  $('#adminAreaSel').addEventListener('change',e=>{ adminAreaFilter=e.target.value||'all'; renderAdmin(); });
  $('#reviewList').addEventListener('click',e=>{
    const ap=e.target.closest('[data-approve]'); if(ap){ approvePost(ap.getAttribute('data-approve')); return; }
    const dp=e.target.closest('[data-del-post]'); if(dp){ deletePost(dp.getAttribute('data-del-post')); return; }
    const full=e.target.closest('[data-full]'); if(full){ openLightbox(full.getAttribute('data-full')); }
  });
  $('#exportBtn').addEventListener('click',exportJSON);

  // 关怀弹窗
  $('#carePrimary').addEventListener('click',closeCare);
  $('#careSecondary').addEventListener('click',gotoDing);
  $('#careOverlay').addEventListener('click',e=>{ if(e.target.id==='careOverlay') closeCare(); });

  // 拦截记录：清空
  $('#clearFlagsBtn').addEventListener('click',()=>{
    if(!(DB.flags&&DB.flags.length)) return;
    DB.flags=[]; saveFlags(); renderFlagList();
    toast(state.lang==='zh'?'已清空拦截记录':'Records cleared');
  });

  // 敏感词 / 白名单管理：删除（事件委托）
  $('#filterMgr').addEventListener('click',e=>{
    const del=e.target.closest('[data-del-word]'); if(!del) return;
    const [cat,idx]=del.getAttribute('data-del-word').split(':');
    if(FILTER[cat]){ FILTER[cat].splice(+idx,1); saveFilter(); renderFilterAdmin(); }
  });
  // 添加（回车）
  $('#filterMgr').addEventListener('keydown',e=>{
    if(e.key!=='Enter') return;
    const inp=e.target.closest('[data-add-cat]'); if(!inp) return;
    e.preventDefault();
    const cat=inp.getAttribute('data-add-cat');
    const val=inp.value.trim();
    if(!val){ return; }
    if(!Array.isArray(FILTER[cat])) FILTER[cat]=[];
    if(FILTER[cat].some(w=>w.toLowerCase()===val.toLowerCase())){ toast(state.lang==='zh'?'该词条已存在':'Already exists'); inp.value=''; return; }
    FILTER[cat].push(val); saveFilter(); renderFilterAdmin();
    toast(state.lang==='zh'?'已添加':'Added');
  });
  // 恢复默认词库
  $('#resetFilterBtn').addEventListener('click',()=>{
    FILTER={}; for(const k of Object.keys(DEFAULT_FILTER)) FILTER[k]=DEFAULT_FILTER[k].slice();
    saveFilter(); renderFilterAdmin();
    toast(state.lang==='zh'?'已恢复默认词库':'Defaults restored');
  });

  // 遮罩 / Lightbox
  $('#mask').addEventListener('click',()=>{ closeSheet(); closeAdmin(); });
  $('#lightbox').addEventListener('click',e=>{ if(e.target.id==='lightbox'||e.target.closest('#lbClose')) closeLightbox(); });

  // ESC
  document.addEventListener('keydown',e=>{
    if(e.key!=='Escape') return;
    if($('#careOverlay').classList.contains('show')) return closeCare();
    if($('#lightbox').classList.contains('show')) return closeLightbox();
    if($('#sheet').classList.contains('show')) return closeSheet();
    if($('#adminModal').classList.contains('show')) return closeAdmin();
  });

  // 启动：拉取后端数据 + 管理员会话 + 实时订阅（后端模式）
  (async ()=>{
    await checkAdminSession();
    await refreshPosts();
    render();
    subscribeRealtime();
  })();
}

let _rtSub=null;
function subscribeRealtime(){
  if(!USE_BACKEND || _rtSub) return;
  try{
    _rtSub = SUPA.channel('posts-rt')
      .on('postgres_changes', { event:'*', schema:'public', table:'posts' }, async ()=>{
        await refreshPosts(); render();
        if($('#adminModal').classList.contains('show') && isAdmin) renderAdmin();
      })
      .subscribe();
  }catch(e){ console.warn('realtime 未启用（预览沙盒下属正常）:', e.message||e); }
}

document.addEventListener('DOMContentLoaded',init);
</script>
